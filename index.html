        /* 虛擬導遊：8-bit 灰貓 Sprite */
        .cat-guide { display: none; position: absolute; left: -1.2rem; top: 1.2rem; font-size: 1.5rem; z-index: 10; animation: bounce 1s infinite alternate; }
        .theme-retro .cat-guide { display: block; }
        .theme-retro .timeline-dot { display: none; } /* 隱藏原本圓點，用灰貓代替 */

        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    </style>
</head>

<!DOCTYPE html>

    <!-- Leaflet CSS & JS -->

    <script src="[https://unpkg.com/leaflet@1.9.4/dist/leaflet.js](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>

        .timeline-dot { position: absolute; left: -0.4rem; top: 1.5rem; width: 12px; height: 12px; border-radius: 50%; background-color: #3b82f6; border: 2px solid white; }

        #map { height: 60vh; border-radius: 0.5rem; z-index: 1; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }

        /* 8-bit 像素風主題 (替代傳統 Dark Mode) */
        body.pixel-theme { font-family: 'DotGothic16', sans-serif; background-color: #e0f8d0; color: #081820; }
        .pixel-theme .bg-white { background-color: #88c070 !important; border: 4px solid #346856; border-radius: 0; box-shadow: 4px 4px 0px #081820; }
        .pixel-theme .bg-blue-600 { background-color: #346856 !important; border-bottom: 4px solid #081820; }
        .pixel-theme .text-gray-800, .pixel-theme .text-gray-700, .pixel-theme .text-gray-500, .pixel-theme .text-gray-600 { color: #081820 !important; }
        .pixel-theme .bg-yellow-50 { background-color: #e0f8d0 !important; border: 2px dashed #346856; }
        .pixel-theme .timeline-dot { background-color: #e0f8d0; border: 2px solid #081820; border-radius: 0; }
        .pixel-theme .transport-line { border-left: 2px dashed #081820; }
        
        /* 灰貓導遊 UI */
        #cat-guide { position: fixed; bottom: 20px; right: 20px; background: white; padding: 10px; border: 3px solid #3b82f6; border-radius: 12px; display: none; z-index: 50; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pixel-theme #cat-guide { display: flex; align-items: center; gap: 10px; background: #e0f8d0; border: 4px solid #081820; border-radius: 0; box-shadow: 4px 4px 0px #081820; }

<body class="text-gray-800">

<div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 sticky top-0 z-20 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">✈️ 東京 Planner</h1>
        <div class="flex gap-2">
            <button onclick="exportCSV()" class="bg-white/20 hover:bg-white/30 p-2 rounded text-sm transition">📥 CSV</button>
            <button onclick="toggleTheme()" class="bg-white/20 hover:bg-white/30 p-2 rounded text-sm transition">👾 8-Bit</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="flex border-b text-center bg-white sticky top-[68px] z-10">
        <button id="tab-timeline" class="flex-1 py-3 tab-active transition" onclick="switchTab('timeline')">📍 時間線</button>
        <button id="tab-map" class="flex-1 py-3 text-gray-500 transition" onclick="switchTab('map')">🗺️ 地圖</button>
    </div>

    <!-- Content: Timeline -->
    <div id="view-timeline" class="p-4">
        <div id="itinerary-list"></div>
        <button class="w-full mt-6 bg-blue-50 text-blue-600 border border-blue-200 py-3 rounded-lg font-medium hover:bg-blue-100 transition" style="border-radius: var(--btn-radius, 0.5rem);">
            + 新增行程
        </button>
    </div>

    <!-- Content: Map -->
    <div id="view-map" class="p-4 hidden">
        <div id="map" class="shadow-inner border border-gray-200"></div>
    </div>
    
    <!-- 8-Bit 灰貓導遊 -->
    <div id="cat-guide">
        <div class="cat-sprite">🐱</div>
        <div class="text-sm font-bold" id="cat-message">喵！準備出發去淺草寺！</div>
    </div>
</div>

<script>
    const itineraryData = [
        { id: 1, time: "09:00", title: "淺草寺 雷門", remarks: "提早去避開人潮。必食仲見世通嘅人形燒！記得買御守。", transport: { mode: "🚇 銀座線", duration: "約 15 分鐘" }, lat: 35.7147, lng: 139.7966 },
        { id: 2, time: "10:30", title: "晴空塔 (Skytree)", remarks: "已預訂 11:00 觀景台門票。", transport: { mode: "🚶‍♂️ 步行", duration: "約 20 分鐘" }, lat: 35.7100, lng: 139.8107 },
        { id: 3, time: "13:00", title: "敘敘苑 燒肉 (押上店)", remarks: "午市套餐性價比最高。", transport: { mode: "🚃 轉乘山手線", duration: "約 40 分鐘" }, lat: 35.7105, lng: 139.8120 },
        { id: 4, time: "15:00", title: "秋葉原", remarks: "扭蛋、買 Game、行中古店。搵絕版卡帶。", transport: null, lat: 35.6983, lng: 139.7731 }
    ];

    let map;

    // 渲染時間線 (保留所有原有功能)
    function renderTimeline() {
        const container = document.getElementById('itinerary-list');
        container.innerHTML = '';
        itineraryData.forEach((item, index) => {
            const isLast = index === itineraryData.length - 1;
            let html = `
                <div class="timeline-container pb-2">
                    <div class="timeline-dot"></div>
                    <div class="bg-white border border-gray-100 shadow-sm rounded-xl p-4 mt-2 mb-2">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-gray-800">${item.time} - ${item.title}</h3>
                        </div>
                        <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-100 text-sm text-gray-700">
                            <strong>💡 攻略：</strong><br>${item.remarks}
                        </div>
                    </div>
            `;
            if (item.transport && !isLast) {
                html += `<div class="transport-line flex items-center gap-2"><span class="bg-gray-100 px-2 py-1 rounded text-xs font-medium text-gray-600">${item.transport.mode}</span><span>⏳ ${item.transport.duration}</span></div>`;
            }
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    function initMap() {
        if (!map) {
            map = L.map('map').setView([itineraryData[0].lat, itineraryData[0].lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            const latlngs = [];
            itineraryData.forEach((item, index) => {
                if (item.lat && item.lng) {
                    L.marker([item.lat, item.lng]).addTo(map).bindPopup(`<b>${index + 1}. ${item.title}</b>`);
                    latlngs.push([item.lat, item.lng]);
                }
            });
            L.polyline(latlngs, {color: '#3b82f6', weight: 3, dashArray: '5, 5'}).addTo(map);
        } else {
            map.invalidateSize();
        }
    }

    function switchTab(tab) {
        document.getElementById('view-timeline').classList.add('hidden');
        document.getElementById('view-map').classList.add('hidden');
        document.getElementById('tab-timeline').classList.remove('tab-active', 'text-gray-500');
        document.getElementById('tab-map').classList.remove('tab-active', 'text-gray-500');
        if (tab === 'timeline') {
            document.getElementById('view-timeline').classList.remove('hidden');
            document.getElementById('tab-timeline').classList.add('tab-active');
            document.getElementById('tab-map').classList.add('text-gray-500');
        } else if (tab === 'map') {
            document.getElementById('view-map').classList.remove('hidden');
            document.getElementById('tab-map').classList.add('tab-active');
            document.getElementById('tab-timeline').classList.add('text-gray-500');
            initMap();
        }
    }

    // 新增：CSV 匯出功能
    function exportCSV() {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // 加入 BOM 解決 Excel 中文亂碼
        csvContent += "時間,景點,備註,交通方式,預計車程\n";
        
        itineraryData.forEach(row => {
            const transportMode = row.transport ? row.transport.mode : "無";
            const transportDuration = row.transport ? row.transport.duration : "無";
            // 處理備註入面嘅換行同逗號
            const remarks = `"${row.remarks.replace(/"/g, '""')}"`;
            csvContent += `${row.time},${row.title},${remarks},${transportMode},${transportDuration}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "tokyo_itinerary.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 新增：主題切換 (8-bit 像素貓咪導遊)
    function toggleTheme() {
        document.body.classList.toggle('pixel-theme');
        const isPixel = document.body.classList.contains('pixel-theme');
        
        // 模擬貓咪隨住時間線俾 Tips
        if(isPixel) {
            document.documentElement.style.setProperty('--btn-radius', '0px');
            setTimeout(() => {
                document.getElementById('cat-message').innerText = "喵... 記得買人形燒！";
            }, 3000);
        } else {
            document.documentElement.style.setProperty('--btn-radius', '0.5rem');
        }
    }

    // 新增：PWA Service Worker 註冊
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('ServiceWorker 註冊成功', reg.scope);
            }).catch(err => {
                console.log('ServiceWorker 註冊失敗 (本地測試屬正常現象): ', err);
            });
        });
    }

    renderTimeline();
</script>
</body>
</html>
