<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港全港骨位地圖 (V17 穩定版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #1a1a1a; }
        .leaflet-control-zoom { display: none; }
        
        /* 黑魂玻璃介面 */
        #bottom-sheet { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        
        .user-location-marker { background: #00ffcc; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div id="status-badge" class="absolute top-6 left-4 z-[1001] bg-black/80 border border-[#00ffcc]/30 text-[#00ffcc] text-xs px-4 py-2 rounded-full flex items-center gap-2">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-[#00ffcc] animate-pulse"></div>
        <span id="status-text">正在連接全港數據庫...</span>
    </div>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-24 right-6 z-[1001] bg-gray-900/90 border border-[#00ffcc]/30 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-[#00ffcc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1 bg-gray-500/50 rounded-full mx-auto mb-2 cursor-pointer" onclick="closeSheet()"></div>
        
        <div class="flex justify-between items-start">
            <div class="w-2/3">
                <h2 id="spot-name" class="text-xl font-bold text-white leading-tight">載入中...</h2>
                <div class="flex gap-2 text-[#00ffcc] font-bold text-xs mt-2">
                    <span id="route-dist" class="bg-[#00ffcc]/10 px-2 py-1 rounded">-- km</span>
                    <span id="route-time" class="bg-[#00ffcc]/10 px-2 py-1 rounded">-- mins</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 block font-bold uppercase tracking-widest">提供車位</span>
                <span id="spot-capacity" class="text-4xl font-black text-[#00ffcc]">--</span>
            </div>
        </div>
        
        <div class="flex gap-3 mt-3">
            <a id="btn-waze" href="#" class="flex-grow bg-[#00ffcc] text-black text-center text-lg font-bold py-4 rounded-2xl active:scale-95 transition-transform shadow-[0_0_15px_rgba(0,255,204,0.3)]">Waze 導航 (避相機)</a>
            <a id="btn-streetview" href="#" target="_blank" class="w-20 bg-gray-800 border border-gray-700 text-white text-center text-sm font-bold py-4 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform"><span class="text-xl">👁️</span></a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        // 1. 初始化地圖
        const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = L.markerClusterGroup({
            disableClusteringAtZoom: 16,
            iconCreateFunction: function(cluster) {
                return L.divIcon({
                    html: `<div style="background-color:rgba(17,24,39,0.95); border: 2px solid #00ffcc; color: #00ffcc; font-weight: bold; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,255,204,0.5);">${cluster.getChildCount()}</div>`,
                    className: '', iconSize: [40, 40]
                });
            }
        });
        
        let userPos = null;

        // 2. 定位功能
        function updateLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = [pos.coords.latitude, pos.coords.longitude];
                    L.marker(userPos, { icon: L.divIcon({className: 'user-location-marker', iconSize:[16,16]}) }).addTo(map);
                    map.flyTo(userPos, 14);
                }, null, {enableHighAccuracy: true});
            }
        }
        document.getElementById('btn-locate').onclick = updateLocation;
        updateLocation();

        // 3. 讀取數據 (加入強化的雙重讀取機制)
        async function loadData() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            
            // 嘗試兩個不同的穩定路徑
            const sources = [
                'https://cdn.jsdelivr.net/gh/g0vhk-archive/on-street-parking@master/data/motorcycle.json',
                'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://raw.githubusercontent.com/g0vhk-archive/on-street-parking/master/data/motorcycle.json')
            ];

            for (let url of sources) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    const data = await response.json();
                    
                    if (data && data.length > 0) {
                        renderSpots(data);
                        statusText.innerText = "數據更新完成";
                        statusDot.classList.replace('animate-pulse', 'animate-none');
                        setTimeout(() => document.getElementById('status-badge').style.opacity = '0', 3000);
                        return; // 成功讀取就停止
                    }
                } catch (e) {
                    console.error("嘗試失敗:", url);
                }
            }

            // 如果全部失敗
            statusText.innerText = "連線失敗，請檢查網路";
            statusDot.classList.replace('bg-[#00ffcc]', 'bg-red-500');
        }

        function renderSpots(data) {
            markers.clearLayers();
            data.forEach(spot => {
                const lat = parseFloat(spot.lat);
                const lng = parseFloat(spot.lng);
                if(isNaN(lat) || isNaN(lng)) return;

                const m = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background:#111; border: 1.5px solid #00ffcc; color:#00ffcc; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900;">${spot.capacity || 'P'}</div>`,
                        iconSize: [30, 30]
                    })
                });
                
                m.on('click', () => {
                    document.getElementById('spot-name').innerText = spot.address || spot.name || "未知街道";
                    document.getElementById('spot-capacity').innerText = spot.capacity || "??";
                    document.getElementById('btn-waze').href = `waze://?ll=${lat},${lng}&navigate=yes`;
                    // 修正街景 Link
                    document.getElementById('btn-streetview').href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${lat},${lng}`;

                    if(userPos) {
                        const d = map.distance(userPos, [lat, lng]) / 1000;
                        document.getElementById('route-dist').innerText = `${d.toFixed(1)} km`;
                        document.getElementById('route-time').innerText = `約 ${Math.round(d*3)} 分鐘`;
                    }
                    document.getElementById('bottom-sheet').classList.replace('sheet-closed', 'sheet-open');
                });
                markers.addLayer(m);
            });
            map.addLayer(markers);
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.replace('sheet-open', 'sheet-closed');
        }

        loadData();
    </script>
</body>
</html>
