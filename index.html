<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全港骨位即時地圖 (V21 官方同步版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #111; }
        .leaflet-control-zoom { display: none; }
        
        #bottom-sheet { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(0, 255, 204, 0.4);
        }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        
        .user-location-marker { background: #fff; border: 3px solid #00ffcc; border-radius: 50%; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div id="status-badge" class="absolute top-6 left-4 z-[1001] bg-black/80 border border-[#00ffcc]/30 text-[#00ffcc] text-xs px-4 py-2 rounded-full flex items-center gap-2">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-[#00ffcc] animate-pulse"></div>
        <span id="status-text">同步全港 12,000+ 骨位中...</span>
    </div>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-28 right-6 z-[1001] bg-gray-900 border border-[#00ffcc]/50 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-[#00ffcc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-2" onclick="closeSheet()"></div>
        <div class="flex justify-between items-start">
            <div class="w-2/3">
                <h2 id="spot-name" class="text-lg font-bold text-white">載入中...</h2>
                <div class="flex gap-2 text-[#00ffcc] font-bold text-[10px] mt-2">
                    <span id="route-dist" class="bg-[#00ffcc]/10 px-2 py-1 rounded border border-[#00ffcc]/20">距離計算中</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 block font-bold uppercase">官方類型</span>
                <span class="text-xl font-black text-[#00ffcc]">骨位/停車場</span>
            </div>
        </div>
        <a id="btn-waze" href="#" class="w-full bg-[#00ffcc] text-black text-center text-lg font-bold py-4 rounded-2xl shadow-[0_0_20px_rgba(0,255,204,0.3)]">Waze 導航</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = L.markerClusterGroup({
            chunkedLoading: true, // 分段載入 12,000 點唔會卡死
            iconCreateFunction: function(cluster) {
                return L.divIcon({
                    html: `<div style="background:rgba(17,24,39,0.9); border:2px solid #00ffcc; color:#00ffcc; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-weight:bold;">${cluster.getChildCount()}</div>`,
                    className: '', iconSize: [40, 40]
                });
            }
        });

        let userPos = null;
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                userPos = [pos.coords.latitude, pos.coords.longitude];
                L.marker(userPos, { icon: L.divIcon({className: 'user-location-marker', iconSize:[16,16]}) }).addTo(map);
                map.flyTo(userPos, 14);
            });
        }

        async function initData() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');

            // 策略：使用政府 API 獲取最新的電單車停車場及路邊骨位資訊
            // 呢個 endpoint 係政府最齊、會每日 update 嘅數據源
            const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.data.gov.hk/v1/carpark-info-vacancy?data=info');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                // 過濾出包含電單車類型的位置
                const spots = data.results.filter(s => s.vehicleTypes && s.vehicleTypes.includes('motorCycle'));

                renderMarkers(spots);
                statusText.innerText = `已同步全港 ${spots.length} 個最新位置`;
                statusDot.classList.replace('animate-pulse', 'bg-[#00ffcc]');
                setTimeout(() => document.getElementById('status-badge').style.opacity = '0', 5000);
            } catch (e) {
                statusText.innerText = "連線受阻，請嘗試刷新頁面";
                statusDot.classList.replace('bg-[#00ffcc]', 'bg-red-500');
            }
        }

        function renderMarkers(spots) {
            markers.clearLayers();
            spots.forEach(spot => {
                const lat = parseFloat(spot.latitude);
                const lng = parseFloat(spot.longitude);
                if(isNaN(lat) || isNaN(lng)) return;

                const m = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background:#111; border:1.5px solid #00ffcc; color:#00ffcc; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold;">P</div>`,
                        iconSize: [24, 24]
                    })
                });

                m.on('click', () => {
                    document.getElementById('spot-name').innerText = spot.displayAddress || spot.name || "政府位置";
                    document.getElementById('btn-waze').href = `waze://?ll=${lat},${lng}&navigate=yes`;
                    if(userPos) {
                        const d = map.distance(userPos, [lat, lng]) / 1000;
                        document.getElementById('route-dist').innerText = `直線距離: ${d.toFixed(1)} km`;
                    }
                    document.getElementById('bottom-sheet').classList.replace('sheet-closed', 'sheet-open');
                });
                markers.addLayer(m);
            });
            map.addLayer(markers);
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.replace('sheet-open', 'sheet-closed');
        }

        initData();
    </script>
</body>
</html>
