<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yutori 旅行手帳</title>
    
    <!-- PWA Setup -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiWXV0b3JpIOaXheihjOaJi+W4syIsInNob3J0X25hbWUiOiJZdXRvcmkiLCJzdGFydF91cmwiOiIvIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZmZmZmZiIsInRoZW1lX2NvbG9yIjoiIzNiODJmNiJ9">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 背景底色改為深灰，突顯中間的手機比例 */
        body { background-color: #374151; display: flex; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; min-height: 100vh; }
        
        /* 手機比例容器 - 解決白色位與跳動 */
        .mobile-container {
            width: 100%;
            max-width: 430px; /* iPhone Pro Max Width */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
        }

        /* 玻璃擬態 (Glassmorphism) */
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .timeline-container { border-left: 2px solid rgba(59, 130, 246, 0.5); margin-left: 1rem; padding-left: 1.5rem; position: relative; }
        .timeline-dot { position: absolute; left: -0.4rem; top: 1.5rem; width: 14px; height: 14px; border-radius: 50%; background-color: #3b82f6; border: 2px solid white; z-index: 2; }
        .transport-line { border-left: 2px dashed rgba(156, 163, 175, 0.6); margin-left: -1.4rem; padding-left: 2.4rem; padding-top: 0.5rem; padding-bottom: 0.5rem; color: #4b5563; font-size: 0.875rem; }
        
        /* 隱藏 Scrollbar 但保持可滾動 */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div id="root" class="w-full flex justify-center"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // 預設資料
    const defaultData = [
        {
            id: 1, name: "東京初心者五天遊", bgImage: "https://i.imgur.com/qdzqxlE.png", archived: false,
            spots: [
                { id: 101, day: 1, time: "09:00", title: "淺草寺 雷門", remarks: "提早去避開人潮。必食人形燒！", mapLink: "https://maps.app.goo.gl/xxx", checked: true, planB: "去附近室內商場", transport: { mode: "🚇 鐵路", location: "銀座線 1號出口", timeHours: "0", timeMins: "15" } },
                { id: 102, day: 1, time: "11:00", title: "晴空塔", remarks: "已買飛", mapLink: "https://maps.app.goo.gl/yyy", checked: false, planB: "水族館", transport: { mode: "🚶‍♂️ 步行", location: "過橋直行", timeHours: "0", timeMins: "20" } }
            ],
            checklists: [
                { id: 201, category: "必備文件", items: [{text: "護照", done: false}, {text: "日元現金", done: true}] }
            ]
        }
    ];

    function App() {
        const [trips, setTrips] = useState(defaultData);
        const [currentTripId, setCurrentTripId] = useState(null);

        // 主畫面背景
        const homeBg = "https://i.imgur.com/qdzqxlE.png";

        const currentTrip = trips.find(t => t.id === currentTripId);

        const saveTrips = (newTrips) => {
            setTrips(newTrips);
            localStorage.setItem('yutori_data', JSON.stringify(newTrips));
        };

        useEffect(() => {
            const saved = localStorage.getItem('yutori_data');
            if(saved) setTrips(JSON.parse(saved));
        }, []);

        // --- 主畫面 (Home) ---
        if (!currentTripId) {
            return (
                <div className="mobile-container" style={{ backgroundImage: `url(${homeBg})` }}>
                    {/* 頂部留空遷就背景 */}
                    <div className="h-40 shrink-0"></div>
                    
                    {/* 內容區塊，自動填滿剩餘高度 */}
                    <div className="flex-1 px-4 pb-10 flex flex-col">
                        <div className="glass-panel rounded-2xl p-5 flex-1 shadow-2xl">
                            <h1 className="text-2xl font-bold text-gray-800 mb-6 text-center">Yutori 旅行手帳</h1>
                            
                            <button className="w-full bg-blue-600/90 text-white py-3 rounded-xl font-bold mb-6 hover:bg-blue-700 transition shadow-md"
                                onClick={() => {
                                    const newTrip = { id: Date.now(), name: "新行程 " + new Date().toLocaleDateString(), bgImage: "https://i.imgur.com/fa2d4kD.png", archived: false, spots: [], checklists: [{ id: Date.now(), category: "預設清單", items: [] }] };
                                    saveTrips([...trips, newTrip]);
                                    setCurrentTripId(newTrip.id);
                                }}>
                                ＋ 建立新行程
                            </button>

                            <div className="space-y-3 overflow-y-auto hide-scroll" style={{maxHeight: "50vh"}}>
                                {trips.map(trip => (
                                    <div key={trip.id} className={`p-4 rounded-xl border flex justify-between items-center transition-all ${trip.archived ? 'bg-gray-200/50 opacity-60' : 'bg-white/80 shadow-sm'}`}>
                                        <div className="flex-1 cursor-pointer" onClick={() => setCurrentTripId(trip.id)}>
                                            <h3 className="font-bold text-lg text-gray-800">{trip.name}</h3>
                                            <p className="text-xs text-gray-600">{trip.spots.length} 個景點 | {trip.archived ? '📦 已封存' : '📍 進行中'}</p>
                                        </div>
                                        <div className="flex gap-2 ml-2">
                                            <button onClick={() => saveTrips(trips.map(t => t.id === trip.id ? {...t, archived: !t.archived} : t))} className="text-xs p-2 bg-gray-100 rounded-lg shadow-sm border border-gray-200">
                                                {trip.archived ? '解封' : '封存'}
                                            </button>
                                            <button onClick={() => {
                                                if(confirm('確定要刪除這個行程嗎？此操作無法還原。')) {
                                                    saveTrips(trips.filter(t => t.id !== trip.id));
                                                }
                                            }} className="text-xs p-2 bg-red-50 text-red-600 rounded-lg shadow-sm border border-red-100">
                                                🗑️ 刪除
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 行程內頁 (Trip View) ---
        return <TripDetail trip={currentTrip} onBack={() => setCurrentTripId(null)} onSave={(updated) => {
            saveTrips(trips.map(t => t.id === updated.id ? updated : t));
        }} />;
    }

    // --- 景點編輯器 (Modal) ---
    function SpotModal({ spot, onClose, onSave }) {
        const [formData, setFormData] = useState(spot || {
            id: Date.now(), day: 1, time: "09:00", title: "", remarks: "", mapLink: "", planB: "", checked: false,
            transport: { mode: "🚇 鐵路", location: "", timeHours: "0", timeMins: "0" }
        });

        const handleChange = (e) => setFormData({...formData, [e.target.name]: e.target.value});
        const handleTransportChange = (e) => setFormData({...formData, transport: {...formData.transport, [e.target.name]: e.target.value}});

        return (
            <div className="fixed inset-0 z-50 flex justify-center items-end sm:items-center bg-black/40 backdrop-blur-sm">
                <div className="bg-white/95 backdrop-blur-xl w-full max-w-[430px] rounded-t-3xl sm:rounded-2xl p-6 shadow-2xl max-h-[85vh] overflow-y-auto animate-fade-in-up">
                    <h3 className="font-bold text-xl mb-4 text-gray-800">{spot ? '✏️ 修改景點' : '＋ 新增景點'}</h3>
                    
                    <div className="space-y-3">
                        <div className="flex gap-3">
                            <div className="flex-1">
                                <label className="text-xs font-bold text-gray-600">第幾日 (Day)</label>
                                <input type="number" name="day" value={formData.day} onChange={handleChange} className="w-full bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400" min="1"/>
                            </div>
                            <div className="flex-1">
                                <label className="text-xs font-bold text-gray-600">時間</label>
                                <input type="time" name="time" value={formData.time} onChange={handleChange} className="w-full bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400"/>
                            </div>
                        </div>
                        
                        <div>
                            <label className="text-xs font-bold text-gray-600">景點名稱</label>
                            <input type="text" name="title" value={formData.title} onChange={handleChange} placeholder="例: 淺草寺" className="w-full bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-gray-600">Google Map 連結</label>
                            <input type="text" name="mapLink" value={formData.mapLink} onChange={handleChange} placeholder="https://maps.app.goo.gl/..." className="w-full bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400"/>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-gray-600">備註 / 攻略</label>
                            <textarea name="remarks" value={formData.remarks} onChange={handleChange} rows="2" className="w-full bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                        </div>

                        <div>
                            <label className="text-xs font-bold text-orange-600">⚠️ Plan B (雨天/突發備案)</label>
                            <input type="text" name="planB" value={formData.planB} onChange={handleChange} placeholder="如果落雨就去..." className="w-full bg-orange-50 border border-orange-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-orange-400"/>
                        </div>

                        <div className="border-t pt-3 mt-3">
                            <label className="text-xs font-bold text-gray-600 mb-1 block">前往下一站之交通</label>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <select name="mode" value={formData.transport.mode} onChange={handleTransportChange} className="bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400">
                                    <option value="🚇 鐵路">🚇 鐵路</option>
                                    <option value="🚌 巴士">🚌 巴士</option>
                                    <option value="🚙 自駕">🚙 自駕</option>
                                    <option value="🚋 纜車">🚋 纜車</option>
                                    <option value="🚶‍♂️ 步行">🚶‍♂️ 步行</option>
                                    <option value="✈️ 飛機">✈️ 飛機</option>
                                    <option value="🚢 船">🚢 船</option>
                                </select>
                                <input type="text" name="location" value={formData.transport.location} onChange={handleTransportChange} placeholder="上車位置 (例: 新宿站)" className="bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400"/>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-gray-500">所需時間:</span>
                                <input type="number" name="timeHours" value={formData.transport.timeHours} onChange={handleTransportChange} className="w-16 bg-gray-100 p-2 rounded-lg text-sm text-center outline-none focus:ring-2 focus:ring-blue-400" min="0"/>
                                <span className="text-xs text-gray-500">小時</span>
                                <input type="number" name="timeMins" value={formData.transport.timeMins} onChange={handleTransportChange} className="w-16 bg-gray-100 p-2 rounded-lg text-sm text-center outline-none focus:ring-2 focus:ring-blue-400" min="0" max="59"/>
                                <span className="text-xs text-gray-500">分鐘</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-3 mt-6">
                        <button onClick={onClose} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold">取消</button>
                        <button onClick={() => onSave(formData)} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">儲存</button>
                    </div>
                </div>
            </div>
        );
    }

    // --- 行程詳細頁面 ---
    function TripDetail({ trip, onBack, onSave }) {
        const [tab, setTab] = useState('list');
        const [collabMode, setCollabMode] = useState(false);
        const [isAiLoading, setIsAiLoading] = useState(false);
        
        // CRUD Modal States
        const [editingSpot, setEditingSpot] = useState(null);
        const [isModalOpen, setIsModalOpen] = useState(false);

        const handleAiOptimize = () => {
            setIsAiLoading(true);
            setTimeout(() => {
                alert("✨ AI 分析完成！已為您重新計算最佳行車時間及順序。");
                setIsAiLoading(false);
            }, 1500);
        };

        const exportTrip = () => {
            let html = `<html><head><meta charset="utf-8"><title>${trip.name}</title></head><body style="font-family:sans-serif; padding: 20px;">`;
            html += `<h1>${trip.name}</h1><hr>`;
            trip.spots.sort((a,b) => a.day - b.day || a.time.localeCompare(b.time)).forEach(s => {
                html += `<h3>[Day ${s.day}] ${s.time} - ${s.title} ${s.checked ? '(✅已打卡)' : ''}</h3>`;
                html += `<p>📝 ${s.remarks}</p>`;
                if(s.transport) html += `<p>🚗 ${s.transport.mode} @ ${s.transport.location} (${s.transport.timeHours}小時${s.transport.timeMins}分鐘)</p>`;
            });
            html += `</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${trip.name}_export.html`;
            link.click();
        };

        const saveSpot = (newSpot) => {
            let newSpots;
            if (trip.spots.find(s => s.id === newSpot.id)) {
                newSpots = trip.spots.map(s => s.id === newSpot.id ? newSpot : s);
            } else {
                newSpots = [...trip.spots, newSpot];
            }
            // 自動按 Day 同 Time 排序
            newSpots.sort((a, b) => a.day - b.day || a.time.localeCompare(b.time));
            onSave({...trip, spots: newSpots});
            setIsModalOpen(false);
        };

        const deleteSpot = (spotId) => {
            if(confirm('確定要刪除這個景點嗎？')) {
                onSave({...trip, spots: trip.spots.filter(s => s.id !== spotId)});
            }
        };

        return (
            <div className="mobile-container" style={{ backgroundImage: `url(${trip.bgImage})` }}>
                {isModalOpen && <SpotModal spot={editingSpot} onClose={() => setIsModalOpen(false)} onSave={saveSpot} />}

                {/* 頂部導航 (Fixed 唔會走位) */}
                <header className="glass-panel sticky top-0 z-20 flex justify-between items-center p-3 border-b-0 shadow-sm shrink-0">
                    <button onClick={onBack} className="bg-black/10 px-3 py-1 rounded-full text-sm font-bold text-gray-800">⬅ 返回</button>
                    <h2 className="font-bold text-gray-900 text-lg truncate px-2">{trip.name}</h2>
                    <div className="flex gap-1">
                        <button onClick={() => setCollabMode(!collabMode)} className={`text-xs px-2 py-1 rounded-full shadow-sm ${collabMode ? 'bg-green-500 text-white' : 'bg-white/80 text-gray-800'}`}>
                            {collabMode ? '🟢 協作中' : '🔗 分享'}
                        </button>
                        <button onClick={exportTrip} className="bg-white/80 text-gray-800 px-2 py-1 rounded-full text-xs shadow-sm">📥</button>
                    </div>
                </header>

                {/* 預留空間比頂部圖片 */}
                <div className="h-24 shrink-0"></div>

                {/* 主內容區 - 使用 flex-1 確保填滿底部，切換 Tab 唔會跳動 */}
                <div className="flex-1 flex flex-col px-4 pb-6">
                    <div className="glass-panel rounded-2xl shadow-xl flex-1 flex flex-col overflow-hidden">
                        
                        {/* Tabs */}
                        <div className="flex border-b border-white/50 shrink-0 bg-white/40">
                            <button onClick={()=>setTab('list')} className={`flex-1 py-3 font-bold text-sm ${tab==='list'?'bg-white/60 text-blue-700 border-b-2 border-blue-500':'text-gray-600'}`}>行程清單</button>
                            <button onClick={()=>setTab('map')} className={`flex-1 py-3 font-bold text-sm ${tab==='map'?'bg-white/60 text-blue-700 border-b-2 border-blue-500':'text-gray-600'}`}>地圖</button>
                            <button onClick={()=>setTab('checklist')} className={`flex-1 py-3 font-bold text-sm ${tab==='checklist'?'bg-white/60 text-blue-700 border-b-2 border-blue-500':'text-gray-600'}`}>行李清單</button>
                        </div>

                        {/* 內容滾動區 */}
                        <div className="p-4 flex-1 overflow-y-auto hide-scroll relative">
                            {tab === 'list' && (
                                <div className="pb-10">
                                    <button onClick={handleAiOptimize} className="w-full mb-5 bg-gradient-to-r from-purple-500 to-indigo-500 text-white py-3 rounded-xl text-sm font-bold shadow-md hover:opacity-90 transition">
                                        {isAiLoading ? '⏳ AI 運算中...' : '✨ AI 路線與時間估算'}
                                    </button>
                                    
                                    {trip.spots.map((spot, index) => (
                                        <div key={spot.id} className={`timeline-container mb-2 transition-all ${!spot.checked ? 'opacity-100' : 'opacity-70 grayscale-[20%]'}`}>
                                            <div className={`timeline-dot ${spot.checked ? 'bg-green-500 border-green-200' : 'bg-blue-500'}`}></div>
                                            
                                            <div className="bg-white/90 rounded-xl p-4 shadow-sm border border-white/50 relative">
                                                {/* 右上角按鈕群：修改 + 打卡 */}
                                                <div className="absolute top-3 right-3 flex gap-2">
                                                    <button onClick={() => { setEditingSpot(spot); setIsModalOpen(true); }} className="text-xs px-2 py-1 bg-gray-200/80 text-gray-700 rounded-md font-bold shadow-sm">✏️ 修改</button>
                                                    <button 
                                                        onClick={() => {
                                                            const newSpots = trip.spots.map(s => s.id === spot.id ? {...s, checked: !s.checked} : s);
                                                            onSave({...trip, spots: newSpots});
                                                        }}
                                                        className={`text-xs px-2 py-1 rounded-md font-bold shadow-sm transition-colors ${spot.checked ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-blue-100 text-blue-700 border border-blue-300'}`}>
                                                        {spot.checked ? '✅ 済' : '📸 打卡'}
                                                    </button>
                                                </div>

                                                <h3 className="font-bold text-lg pr-28 text-blue-900">Day {spot.day} | {spot.time}</h3>
                                                <h4 className="text-lg font-black text-gray-800 mb-2">{spot.title}</h4>
                                                
                                                {spot.mapLink && (
                                                    <a href={spot.mapLink} target="_blank" className="inline-block mb-3 bg-blue-50/80 text-blue-700 text-xs px-3 py-1.5 rounded-md border border-blue-200 shadow-sm font-bold">
                                                        🗺️ Google 導航
                                                    </a>
                                                )}

                                                {spot.remarks && <p className="text-sm bg-yellow-50/90 p-3 rounded-lg border border-yellow-100 text-gray-700 mb-3 shadow-inner">📝 {spot.remarks}</p>}

                                                {spot.planB && (
                                                    <details className="mb-2 text-sm bg-orange-50/90 rounded-lg border border-orange-200 overflow-hidden shadow-sm">
                                                        <summary className="p-2.5 font-bold text-orange-700 cursor-pointer outline-none bg-orange-100/50">⚠️ 雨天 / 突發 Plan B</summary>
                                                        <div className="p-3 pt-1 text-orange-800 leading-relaxed">{spot.planB}</div>
                                                    </details>
                                                )}

                                                <div className="mt-2 text-right">
                                                    <button onClick={() => deleteSpot(spot.id)} className="text-xs text-red-400 hover:text-red-600 underline">刪除此景點</button>
                                                </div>
                                            </div>

                                            {/* 交通 */}
                                            {spot.transport && index !== trip.spots.length - 1 && (
                                                <div className="transport-line">
                                                    <div className="bg-white/80 inline-block px-3 py-1.5 rounded-lg text-xs shadow-sm border border-gray-100">
                                                        <span className="font-bold text-blue-800">{spot.transport.mode}</span> 
                                                        {spot.transport.location && <span className="ml-1 text-gray-600">(@{spot.transport.location})</span>}
                                                        <span className="ml-2 font-medium">⏳ {spot.transport.timeHours}h {spot.transport.timeMins}m</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}

                                    <button onClick={() => { setEditingSpot(null); setIsModalOpen(true); }} className="w-full mt-4 bg-white/70 border-2 border-dashed border-blue-400 text-blue-700 py-3 rounded-xl font-bold hover:bg-white/90 transition shadow-sm">
                                        ＋ 新增行程景點
                                    </button>
                                </div>
                            )}

                            {tab === 'map' && (
                                <div className="text-center py-6 h-full flex flex-col justify-center">
                                    <div className="text-5xl mb-4">🗺️</div>
                                    <h3 className="font-bold text-gray-800 text-lg mb-2">Google Maps 一鍵路線生成</h3>
                                    <p className="text-sm text-gray-600 mb-6 bg-white/50 p-3 rounded-lg inline-block">系統會根據您清單中的景點，自動生成當日的真實導航路線。</p>
                                    
                                    <div className="space-y-4">
                                        {[...new Set(trip.spots.map(s => s.day))].sort((a,b)=>a-b).map(day => {
                                            const daySpots = trip.spots.filter(s => s.day === day);
                                            if(daySpots.length < 2) return (
                                                <div key={day} className="text-sm text-gray-400">Day {day} 景點不足，無法生成路線</div>
                                            );
                                            return (
                                                <button key={day} onClick={() => {
                                                    const origin = encodeURIComponent(daySpots[0].title);
                                                    const dest = encodeURIComponent(daySpots[daySpots.length-1].title);
                                                    const waypoints = daySpots.slice(1, -1).map(s => encodeURIComponent(s.title)).join('|');
                                                    window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${waypoints}`, '_blank');
                                                }} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">
                                                    📍 在 Google Maps 開啟 Day {day} 路線
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {tab === 'checklist' && (
                                <div className="pb-10">
                                    <p className="text-sm text-gray-600 mb-4 text-center bg-white/50 p-2 rounded-lg">多重分類清單，點擊文字即可劃線。</p>
                                    {trip.checklists.map((list, listIndex) => (
                                        <div key={list.id} className="mb-5 bg-white/80 p-4 rounded-xl shadow-sm border border-white/60">
                                            <h4 className="font-bold text-gray-800 mb-3 text-lg border-b pb-2">{list.category}</h4>
                                            {list.items.map((item, i) => (
                                                <div key={i} className="flex items-center gap-3 mb-2 cursor-pointer bg-white/50 p-2 rounded-lg hover:bg-white transition" onClick={() => {
                                                    const newChecklists = [...trip.checklists];
                                                    newChecklists[listIndex].items[i].done = !newChecklists[listIndex].items[i].done;
                                                    onSave({...trip, checklists: newChecklists});
                                                }}>
                                                    <div className={`w-5 h-5 rounded border flex justify-center items-center ${item.done ? 'bg-green-500 border-green-500' : 'bg-white border-gray-400'}`}>
                                                        {item.done && <span className="text-white text-xs">✓</span>}
                                                    </div>
                                                    <span className={`text-sm ${item.done ? 'line-through text-gray-400' : 'text-gray-800 font-medium'}`}>{item.text}</span>
                                                </div>
                                            ))}
                                            <div className="mt-3 flex gap-2">
                                                <input type="text" id={`newItem_${list.id}`} placeholder="新增物品..." className="flex-1 bg-gray-100 p-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-400" 
                                                    onKeyPress={(e) => {
                                                        if(e.key === 'Enter' && e.target.value.trim()) {
                                                            const newChecklists = [...trip.checklists];
                                                            newChecklists[listIndex].items.push({text: e.target.value.trim(), done: false});
                                                            onSave({...trip, checklists: newChecklists});
                                                            e.target.value = '';
                                                        }
                                                    }}
                                                />
                                                <button onClick={() => {
                                                    const input = document.getElementById(`newItem_${list.id}`);
                                                    if(input.value.trim()) {
                                                        const newChecklists = [...trip.checklists];
                                                        newChecklists[listIndex].items.push({text: input.value.trim(), done: false});
                                                        onSave({...trip, checklists: newChecklists});
                                                        input.value = '';
                                                    }
                                                }} className="bg-gray-200 px-3 rounded-lg text-sm font-bold text-gray-700">＋</button>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => {
                                        const cat = prompt("請輸入新清單分類名稱 (例: 藥妝清單):");
                                        if(cat && cat.trim()) {
                                            onSave({...trip, checklists: [...trip.checklists, { id: Date.now(), category: cat, items: [] }]});
                                        }
                                    }} className="w-full mt-2 bg-white/70 border-2 border-dashed border-gray-400 text-gray-600 py-3 rounded-xl font-bold hover:bg-white/90 transition">
                                        ＋ 新增清單分類
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
