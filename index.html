<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港全港骨位地圖 (Live版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .leaflet-control-zoom { display: none; }
        #bottom-sheet { transition: transform 0.3s ease; z-index: 1000; }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        .user-location-marker { background: #3b82f6; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 0 10px #3b82f6; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-10 right-6 z-[1001] bg-blue-600 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto" id="close-sheet"></div>
        <div class="flex justify-between items-start">
            <h2 id="spot-name" class="text-2xl font-bold text-white leading-tight w-2/3">請選擇骨位</h2>
            <div class="text-right">
                <span class="text-xs text-gray-400 block font-bold">總位數</span>
                <span id="spot-capacity" class="text-4xl font-black text-green-400">--</span>
            </div>
        </div>
        <div class="flex gap-4 text-gray-300 text-sm italic">
            <span id="route-dist">距離計算中...</span>
            <span id="route-time"></span>
        </div>
        <div class="flex flex-col gap-3">
            <a id="btn-waze" href="#" class="w-full bg-[#33ccff] text-black text-center text-xl font-black py-4 rounded-2xl flex items-center justify-center">
                Waze 導航 (避相機)
            </a>
            <button onclick="closeSheet()" class="text-gray-500 text-sm py-2">關閉詳情</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = L.markerClusterGroup(); // 使用 Cluster 處理大量數據
        let userPos = null;

        // 1. 獲取定位
        function updateLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                userPos = [pos.coords.latitude, pos.coords.longitude];
                L.marker(userPos, {icon: L.divIcon({className: 'user-location-marker', iconSize:[16,16]})}).addTo(map);
                map.flyTo(userPos, 15);
            }, null, {enableHighAccuracy: true});
        }
        document.getElementById('btn-locate').onclick = updateLocation;
        updateLocation();

        // 2. 直接讀取全港數據 (這裡使用模擬的完整 Data 結構示範)
        // 在真實開發中，你會用 fetch('https://api.data.gov.hk/...')
        async function loadAllSpots() {
            try {
                // 模擬抓取政府資料庫
                // 現實中你可以從 Data.gov.hk 獲取 "On-street Parking Spaces for Motorcycles"
                const response = await fetch('https://raw.githubusercontent.com/g0vhk-archive/on-street-parking/master/data/motorcycle.json');
                const data = await response.json();

                data.forEach(spot => {
                    // 根據數據格式調整 (這裡假設格式為 {address, lat, lng, capacity})
                    const marker = L.marker([spot.lat, spot.lng], {
                        icon: L.divIcon({
                            className: '',
                            html: `<div class="bg-green-500 border-2 border-white rounded-full text-[10px] text-white font-bold flex items-center justify-center w-8 h-8">${spot.capacity || '?'}</div>`
                        })
                    });

                    marker.on('click', () => {
                        showDetails(spot);
                    });
                    markers.addLayer(marker);
                });
                map.addLayer(markers);
            } catch (e) {
                console.error("載入失敗", e);
                alert("無法連線至政府數據庫，請稍後再試。");
            }
        }

        function showDetails(spot) {
            document.getElementById('spot-name').innerText = spot.address || spot.name || "未知街道";
            document.getElementById('spot-capacity').innerText = spot.capacity || "??";
            document.getElementById('btn-waze').href = `waze://?ll=${spot.lat},${spot.lng}&navigate=yes`;
            
            if(userPos) {
                // 快速計算直線距離 (KM)
                const d = map.distance(userPos, [spot.lat, spot.lng]) / 1000;
                document.getElementById('route-dist').innerText = `直線距離: ${d.toFixed(1)} km`;
                document.getElementById('route-time').innerText = `(約 ${Math.round(d*3)} 分鐘車程)`;
            }

            document.getElementById('bottom-sheet').className = "fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl p-6 sheet-open flex flex-col gap-4 pb-12";
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').className = "fixed bottom-0 left-0 w-full bg-gray-900 border-t border-gray-700 rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12";
        }

        loadAllSpots();
    </script>
</body>
</html>
