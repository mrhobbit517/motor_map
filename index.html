<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yutori 旅行手帳</title>
    
    <!-- PWA Setup -->
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiWXV0b3JpIOaXheihjOaJi+W4syIsInNob3J0X25hbWUiOiJZdXRvcmkiLCJzdGFydF91cmwiOiIvIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZmZmZmZiIsInRoZW1lX2NvbG9yIjoiIzNiODJmNiJ9">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #e5e7eb; display: flex; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        /* 手機比例容器 (iPhone Pro Max Width) */
        .mobile-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: #f9fafb;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow-x: hidden;
            background-size: 100% auto;
            background-repeat: no-repeat;
            background-position: top center;
            background-attachment: scroll;
        }

        /* 玻璃擬態 (Glassmorphism) */
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .timeline-container { border-left: 2px solid rgba(59, 130, 246, 0.5); margin-left: 1rem; padding-left: 1.5rem; position: relative; }
        .timeline-dot { position: absolute; left: -0.4rem; top: 1.5rem; width: 14px; height: 14px; border-radius: 50%; background-color: #3b82f6; border: 2px solid white; z-index: 2; }
        .transport-line { border-left: 2px dashed rgba(156, 163, 175, 0.6); margin-left: -1.4rem; padding-left: 2.4rem; padding-top: 0.5rem; padding-bottom: 0.5rem; color: #4b5563; font-size: 0.875rem; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // 預設資料
    const defaultData = [
        {
            id: 1, name: "東京初心者五天遊", bgImage: "https://i.imgur.com/qdzqxlE.png", archived: false,
            spots: [
                { id: 101, day: 1, time: "09:00", title: "淺草寺 雷門", remarks: "提早去避開人潮。必食人形燒！", mapLink: "https://maps.app.goo.gl/xxx", checked: true, planB: "去附近室內商場", transport: { mode: "🚇 鐵路", location: "銀座線 1號出口", timeHours: "0", timeMins: "15" } },
                { id: 102, day: 1, time: "11:00", title: "晴空塔", remarks: "已買飛", mapLink: "https://maps.app.goo.gl/yyy", checked: false, planB: "水族館", transport: { mode: "🚶‍♂️ 步行", location: "過橋直行", timeHours: "0", timeMins: "20" } }
            ],
            checklists: [
                { id: 201, category: "必備文件", items: [{text: "護照", done: false}, {text: "日元現金", done: true}] }
            ]
        }
    ];

    function App() {
        const [trips, setTrips] = useState(defaultData);
        const [currentTripId, setCurrentTripId] = useState(null);

        // 主畫面背景
        const homeBg = "https://i.imgur.com/qdzqxlE.png";

        const currentTrip = trips.find(t => t.id === currentTripId);

        const saveTrips = (newTrips) => {
            setTrips(newTrips);
            localStorage.setItem('yutori_data', JSON.stringify(newTrips));
        };

        useEffect(() => {
            const saved = localStorage.getItem('yutori_data');
            if(saved) setTrips(JSON.parse(saved));
        }, []);

        // --- 主畫面 (Home) ---
        if (!currentTripId) {
            return (
                <div className="mobile-container" style={{ backgroundImage: `url(${homeBg})` }}>
                    <div className="pt-48 px-4 pb-10">
                        <div className="glass-panel rounded-2xl p-5">
                            <h1 className="text-2xl font-bold text-gray-800 mb-4 text-center">Yutori 旅行手帳</h1>
                            
                            <button className="w-full bg-blue-600/90 text-white py-3 rounded-xl font-bold mb-6 hover:bg-blue-700 transition"
                                onClick={() => {
                                    const newTrip = { id: Date.now(), name: "新行程", bgImage: "https://i.imgur.com/fa2d4kD.png", archived: false, spots: [], checklists: [] };
                                    saveTrips([...trips, newTrip]);
                                    setCurrentTripId(newTrip.id);
                                }}>
                                + 建立新行程
                            </button>

                            <div className="space-y-3">
                                {trips.map(trip => (
                                    <div key={trip.id} className={`p-4 rounded-xl border flex justify-between items-center ${trip.archived ? 'bg-gray-100/50 opacity-60' : 'bg-white/80'}`}>
                                        <div className="flex-1 cursor-pointer" onClick={() => setCurrentTripId(trip.id)}>
                                            <h3 className="font-bold text-lg">{trip.name}</h3>
                                            <p className="text-xs text-gray-500">{trip.spots.length} 個景點 | {trip.archived ? '📦 已封存' : '進行中'}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {
                                                const updated = trips.map(t => t.id === trip.id ? {...t, archived: !t.archived} : t);
                                                saveTrips(updated);
                                            }} className="text-sm p-2 bg-gray-200/50 rounded-lg">{trip.archived ? '解封' : '封存'}</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 行程內頁 (Trip View) ---
        return <TripDetail trip={currentTrip} onBack={() => setCurrentTripId(null)} onSave={(updated) => {
            saveTrips(trips.map(t => t.id === updated.id ? updated : t));
        }} />;
    }

    // --- 行程詳細頁面 ---
    function TripDetail({ trip, onBack, onSave }) {
        const [tab, setTab] = useState('list');
        const [collabMode, setCollabMode] = useState(false);
        const [isAiLoading, setIsAiLoading] = useState(false);

        // 模擬 AI 優化
        const handleAiOptimize = () => {
            setIsAiLoading(true);
            setTimeout(() => {
                alert("✨ AI 分析完成！已為您重新計算最佳行車時間及順序。");
                setIsAiLoading(false);
            }, 1500);
        };

        // 匯出功能 (完美保留)
        const exportTrip = () => {
            let html = `<html><head><meta charset="utf-8"><title>${trip.name}</title></head><body style="font-family:sans-serif; padding: 20px;">`;
            html += `<h1>${trip.name}</h1><hr>`;
            trip.spots.forEach(s => {
                html += `<h3>[Day ${s.day}] ${s.time} - ${s.title} ${s.checked ? '(✅已打卡)' : ''}</h3>`;
                html += `<p>📝 ${s.remarks}</p>`;
                if(s.transport) html += `<p>🚗 ${s.transport.mode} (${s.transport.timeHours}小時${s.transport.timeMins}分鐘)</p>`;
            });
            html += `</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${trip.name}_export.html`;
            link.click();
        };

        return (
            <div className="mobile-container" style={{ backgroundImage: `url(${trip.bgImage})` }}>
                {/* 頂部導航 */}
                <header className="glass-panel sticky top-0 z-20 flex justify-between items-center p-3 border-b-0 shadow-sm">
                    <button onClick={onBack} className="bg-black/10 px-3 py-1 rounded-full text-sm font-bold">⬅ 返回</button>
                    <h2 className="font-bold text-gray-800 text-lg truncate px-2">{trip.name}</h2>
                    <div className="flex gap-1">
                        <button onClick={() => setCollabMode(!collabMode)} className={`text-xs px-2 py-1 rounded-full ${collabMode ? 'bg-green-500 text-white' : 'bg-black/10'}`}>
                            {collabMode ? '🟢 協作中' : '🔗 分享'}
                        </button>
                        <button onClick={exportTrip} className="bg-black/10 px-2 py-1 rounded-full text-xs">📥</button>
                    </div>
                </header>

                {/* 主內容區 - 留出頂部空間讓背景透出 */}
                <div className="pt-32 pb-20 px-4 min-h-[80vh]">
                    <div className="glass-panel rounded-2xl overflow-hidden shadow-lg">
                        
                        {/* Tabs */}
                        <div className="flex border-b border-white/40">
                            <button onClick={()=>setTab('list')} className={`flex-1 py-3 font-bold ${tab==='list'?'bg-white/40 text-blue-600':'text-gray-600'}`}>清單</button>
                            <button onClick={()=>setTab('map')} className={`flex-1 py-3 font-bold ${tab==='map'?'bg-white/40 text-blue-600':'text-gray-600'}`}>地圖</button>
                            <button onClick={()=>setTab('checklist')} className={`flex-1 py-3 font-bold ${tab==='checklist'?'bg-white/40 text-blue-600':'text-gray-600'}`}>行李</button>
                        </div>

                        <div className="p-4">
                            {tab === 'list' && (
                                <div>
                                    <button onClick={handleAiOptimize} className="w-full mb-4 bg-purple-500/80 text-white py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-purple-600">
                                        {isAiLoading ? '⏳ AI 運算中...' : '✨ AI 路線與時間估算'}
                                    </button>
                                    
                                    {trip.spots.map((spot, index) => (
                                        <div key={spot.id} className={`timeline-container mb-2 transition-all ${!spot.checked ? 'opacity-90' : 'opacity-60 grayscale-[30%]'}`}>
                                            <div className={`timeline-dot ${spot.checked ? 'bg-green-500' : 'bg-blue-500'}`}></div>
                                            
                                            <div className="bg-white/80 rounded-xl p-3 shadow-sm border border-white/50 relative">
                                                {/* 打卡按鈕縮細放右上角 */}
                                                <button 
                                                    onClick={() => {
                                                        const newSpots = trip.spots.map(s => s.id === spot.id ? {...s, checked: !s.checked} : s);
                                                        onSave({...trip, spots: newSpots});
                                                    }}
                                                    className={`absolute top-3 right-3 text-xs px-2 py-1 rounded-md font-bold ${spot.checked ? 'bg-green-100 text-green-700' : 'bg-gray-200 text-gray-600'}`}>
                                                    {spot.checked ? '✅ 済' : '📸 打卡'}
                                                </button>

                                                <h3 className="font-bold text-lg pr-12">Day {spot.day} | {spot.time}</h3>
                                                <h4 className="text-md font-black text-gray-800 mb-2">{spot.title}</h4>
                                                
                                                {/* Google 導航按鈕 */}
                                                {spot.mapLink && (
                                                    <a href={spot.mapLink} target="_blank" className="inline-block mb-2 bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded border border-blue-200">
                                                        🗺️ Google 導航
                                                    </a>
                                                )}

                                                <p className="text-sm bg-yellow-50/80 p-2 rounded text-gray-700 mb-2">📝 {spot.remarks}</p>

                                                {/* Plan B 摺疊區 */}
                                                {spot.planB && (
                                                    <details className="mb-2 text-sm bg-orange-50/80 rounded border border-orange-100">
                                                        <summary className="p-2 font-bold text-orange-600 cursor-pointer outline-none">⚠️ 雨天 / 突發 Plan B</summary>
                                                        <div className="p-2 pt-0 text-orange-800">{spot.planB}</div>
                                                    </details>
                                                )}
                                            </div>

                                            {/* 交通 */}
                                            {spot.transport && index !== trip.spots.length - 1 && (
                                                <div className="transport-line">
                                                    <div className="bg-white/60 inline-block px-2 py-1 rounded text-xs">
                                                        <span className="font-bold">{spot.transport.mode}</span> 
                                                        {spot.transport.location && <span className="ml-1 text-gray-500">(@{spot.transport.location})</span>}
                                                        <span className="ml-2">⏳ {spot.transport.timeHours}h {spot.transport.timeMins}m</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}

                            {tab === 'map' && (
                                <div className="text-center py-10">
                                    <div className="text-4xl mb-4">🗺️</div>
                                    <h3 className="font-bold text-gray-700 mb-2">Google Maps 一鍵路線生成</h3>
                                    <p className="text-sm text-gray-500 mb-6">系統會根據您清單中的景點名稱，自動生成當日的真實導航路線。</p>
                                    
                                    <div className="space-y-3">
                                        {[1, 2, 3].map(day => {
                                            const daySpots = trip.spots.filter(s => s.day === day);
                                            if(daySpots.length < 2) return null;
                                            return (
                                                <button key={day} onClick={() => {
                                                    const origin = encodeURIComponent(daySpots[0].title);
                                                    const dest = encodeURIComponent(daySpots[daySpots.length-1].title);
                                                    const waypoints = daySpots.slice(1, -1).map(s => encodeURIComponent(s.title)).join('|');
                                                    window.open(`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${waypoints}`, '_blank');
                                                }} className="w-full bg-blue-600/90 text-white py-3 rounded-lg font-bold shadow-md">
                                                    📍 在 Google Maps 開啟 Day {day} 路線
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {tab === 'checklist' && (
                                <div>
                                    <p className="text-sm text-gray-500 mb-4 text-center">多重分類清單，點擊文字即可劃線。</p>
                                    {trip.checklists.map(list => (
                                        <div key={list.id} className="mb-4 bg-white/70 p-3 rounded-xl">
                                            <h4 className="font-bold text-gray-800 mb-2">{list.category}</h4>
                                            {list.items.map((item, i) => (
                                                <div key={i} className="flex items-center gap-2 mb-1" onClick={() => {
                                                    const newChecklists = trip.checklists.map(cl => {
                                                        if(cl.id === list.id) {
                                                            const newItems = [...cl.items];
                                                            newItems[i].done = !newItems[i].done;
                                                            return {...cl, items: newItems};
                                                        }
                                                        return cl;
                                                    });
                                                    onSave({...trip, checklists: newChecklists});
                                                }}>
                                                    <input type="checkbox" checked={item.done} readOnly className="w-4 h-4"/>
                                                    <span className={item.done ? 'line-through text-gray-400' : 'text-gray-700'}>{item.text}</span>
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

<!-- Service Worker 模擬 (For PWA) -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register(`data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZT0+e30pOw==`)
            .then(() => console.log('PWA Ready')).catch(()=>console.log('PWA Local fallback'));
        });
    }
</script>

</body>
</html>
