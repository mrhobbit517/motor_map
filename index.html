<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港骨位地圖 (型格黑魂版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .leaflet-control-zoom { display: none; }
        
        /* 黑魂玻璃介面 */
        #bottom-sheet { 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        
        /* 螢光科技感定位點 */
        .user-location-marker { 
            background: #00ffcc; 
            border: 2px solid #fff; 
            border-radius: 50%; 
            box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc; 
        }

        /* 隱藏預設滾動條 */
        ::-webkit-scrollbar { display: none; }

        #status-badge { display: none; }
    </style>
</head>
<body>

    <div id="status-badge" class="absolute top-4 left-4 z-[1001] bg-gray-900 border border-gray-700 text-gray-300 text-xs font-bold px-4 py-2 rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] flex items-center gap-2">
        <span class="w-2 h-2 rounded-full animate-pulse" id="status-dot"></span>
        <span id="status-text">連線中...</span>
    </div>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-[5.5rem] right-6 z-[1001] bg-gray-800 border border-gray-600 text-white p-3.5 rounded-full shadow-[0_0_20px_rgba(0,0,0,0.6)] active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-[#00ffcc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1.5 bg-gray-600 rounded-full mx-auto mb-2" id="close-sheet"></div>
        
        <div class="flex justify-between items-start">
            <div class="w-2/3">
                <h2 id="spot-name" class="text-2xl font-bold text-white leading-tight">請選擇骨位</h2>
                <div class="flex gap-3 text-gray-400 text-sm mt-2">
                    <span id="route-dist" class="bg-gray-800 px-2 py-1 rounded-md">距離...</span>
                    <span id="route-time" class="bg-gray-800 px-2 py-1 rounded-md">時間...</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-xs text-gray-500 block font-bold mb-1 tracking-wider uppercase">Capacity</span>
                <span id="spot-capacity" class="text-4xl font-black text-[#00ffcc] drop-shadow-[0_0_10px_rgba(0,255,204,0.3)]">--</span>
            </div>
        </div>
        
        <div class="flex gap-3 mt-4">
            <a id="btn-waze" href="#" class="flex-grow bg-[#00ffcc] text-black text-center text-lg font-black py-3.5 rounded-2xl flex items-center justify-center shadow-[0_0_15px_rgba(0,255,204,0.2)] active:scale-95 transition-transform">
                Waze 導航
            </a>
            <a id="btn-streetview" href="#" target="_blank" class="w-20 bg-gray-800 border border-gray-700 text-white text-center text-sm font-bold py-3.5 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-lg mb-0.5">👁️</span> 街景
            </a>
        </div>
        <button onclick="closeSheet()" class="text-gray-500 hover:text-white transition-colors text-sm py-2 mt-2 font-medium">關閉詳情</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        // 設定地圖為 Dark Mode (CartoDB Dark Matter)
        const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 群組標記樣式 (黑魂螢光綠)
        const markers = L.markerClusterGroup({
            disableClusteringAtZoom: 16,
            maxClusterRadius: 40,
            iconCreateFunction: function(cluster) {
                const count = cluster.getChildCount();
                return L.divIcon({
                    html: `<div style="background-color:rgba(17,24,39,0.9); border: 2px solid #00ffcc; color: #00ffcc; font-weight: bold; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(0,255,204,0.3);">${count}</div>`,
                    className: '', iconSize: [36, 36]
                });
            }
        });
        
        let userPos = null;
        const CACHE_KEY = 'hk_motorcycle_spots_csv_v12';

        function updateLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = [pos.coords.latitude, pos.coords.longitude];
                    L.marker(userPos, {
                        icon: L.divIcon({className: 'user-location-marker', iconSize:[16,16]})
                    }).addTo(map);
                    map.flyTo(userPos, 14, {duration: 1.5});
                }, null, {enableHighAccuracy: true});
            }
        }
        document.getElementById('btn-locate').onclick = updateLocation;
        updateLocation();

        function renderSpots(data) {
            markers.clearLayers();
            data.forEach(spot => {
                if(!spot.lat || !spot.lng) return;
                const marker = L.marker([spot.lat, spot.lng], {
                    // 單個骨位標記
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background-color:#111827; border: 2px solid #374151; color: #fff; font-weight: bold; font-size: 11px; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;">${spot.capacity || '?'}</div>`,
                        iconSize: [28, 28]
                    })
                });
                marker.on('click', () => showDetails(spot));
                markers.addLayer(marker);
            });
            map.addLayer(markers);
        }

        // 更新狀態 UI
        function updateStatus(text, colorClass) {
            const badge = document.getElementById('status-badge');
            const dot = document.getElementById('status-dot');
            badge.style.display = 'flex';
            document.getElementById('status-text').innerText = text;
            dot.className = `w-2 h-2 rounded-full animate-pulse ${colorClass}`;
        }

        // 內置急救包數據 (確保即使斷網/Link死咗，都有基本數據顯示)
        const emergencyFallbackSpots = [
            { lat: 22.3204, lng: 114.16
