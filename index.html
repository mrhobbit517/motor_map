<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港骨位地圖 (型格黑魂修復版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #000; }
        .leaflet-control-zoom { display: none; }
        
        /* 黑魂玻璃介面 */
        #bottom-sheet { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 -10px 50px rgba(0,0,0,0.9);
        }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        
        .user-location-marker { 
            background: #00ffcc; 
            border: 2px solid #fff; 
            border-radius: 50%; 
            box-shadow: 0 0 15px #00ffcc; 
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="status-badge" class="absolute top-6 left-4 z-[1001] bg-black/70 border border-white/20 text-white text-xs px-4 py-2 rounded-full flex items-center gap-2">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div>
        <span id="status-text">載入地圖中...</span>
    </div>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-24 right-6 z-[1001] bg-gray-900/80 border border-white/20 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-[#00ffcc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1 bg-gray-500/50 rounded-full mx-auto mb-2" onclick="closeSheet()"></div>
        
        <div class="flex justify-between items-start">
            <div class="w-2/3">
                <h2 id="spot-name" class="text-xl font-bold text-white leading-tight">請選擇位置</h2>
                <div class="flex gap-2 text-gray-400 text-xs mt-2">
                    <span id="route-dist" class="bg-white/10 px-2 py-1 rounded">-- km</span>
                    <span id="route-time" class="bg-white/10 px-2 py-1 rounded">-- mins</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-500 block font-bold uppercase tracking-widest">Spots</span>
                <span id="spot-capacity" class="text-4xl font-black text-[#00ffcc]">--</span>
            </div>
        </div>
        
        <div class="flex gap-3 mt-2">
            <a id="btn-waze" href="#" class="flex-grow bg-[#00ffcc] text-black text-center text-lg font-bold py-4 rounded-2xl active:scale-95 transition-transform">
                Waze 導航
            </a>
            <a id="btn-streetview" href="#" target="_blank" class="w-20 bg-gray-800 text-white text-center text-sm font-bold py-4 rounded-2xl flex flex-col items-center justify-center active:scale-95 transition-transform">
                <span class="text-xl">👁️</span>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        // 1. 初始化地圖 (先保證有畫面)
        const map = L.map('map', { zoomControl: false, fadeAnimation: true }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        const markers = L.markerClusterGroup({
            disableClusteringAtZoom: 16,
            polygonOptions: { color: '#00ffcc', weight: 2 }
        });
        
        let userPos = null;
        const CACHE_KEY = 'hk_parking_data_v13';

        // 2. 定位功能
        function updateLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = [pos.coords.latitude, pos.coords.longitude];
                    L.marker(userPos, {
                        icon: L.divIcon({className: 'user-location-marker', iconSize:[14,14]})
                    }).addTo(map);
                    map.flyTo(userPos, 15);
                }, err => console.log('定位失敗'), {enableHighAccuracy: true});
            }
        }
        document.getElementById('btn-locate').onclick = updateLocation;
        updateLocation();

        // 3. 數據解析與渲染
        function renderSpots(data) {
            markers.clearLayers();
            data.forEach(spot => {
                const m = L.marker([spot.lat, spot.lng], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background:#111; border: 1.5px solid #00ffcc; color:#00ffcc; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; box-shadow:0 0 10px rgba(0,255,204,0.3);">${spot.capacity}</div>`,
                        iconSize: [28, 28]
                    })
                });
                m.on('click', () => showDetails(spot));
                markers.addLayer(m);
            });
            map.addLayer(markers);
        }

        // 4. 讀取數據 (加入穩定 Proxy)
        function loadData() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            
            // 先看快取
            const cached = localStorage.getItem(CACHE_KEY);
            if(cached) {
                renderSpots(JSON.parse(cached));
                statusText.innerText = "正在同步最新數據...";
            }

            // 使用政府原始 CSV (透過 allorigins 代理)
            const targetUrl = 'https://raw.githubusercontent.com/g0vhk-archive/on-street-parking/master/data/motorcycle.csv';
            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

            Papa.parse(proxyUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const cleanData = results.data.map(row => ({
                        lat: parseFloat(row.lat || row.Latitude),
                        lng: parseFloat(row.lng || row.Longitude),
                        capacity: row.capacity || row.Space_No || "?",
                        address: row.address || row.Street_Name || "未知地點"
                    })).filter(s => !isNaN(s.lat));

                    if(cleanData.length > 0) {
                        renderSpots(cleanData);
                        localStorage.setItem(CACHE_KEY, JSON.stringify(cleanData));
                        statusText.innerText = "數據已就緒";
                        statusDot.classList.replace('bg-yellow-400', 'bg-green-400');
                        setTimeout(() => document.getElementById('status-badge').style.opacity = '0', 3000);
                    }
                },
                error: function() {
                    statusText.innerText = "連線失敗，使用離線數據";
                    statusDot.classList.replace('bg-yellow-400', 'bg-red-500');
                }
            });
        }

        function showDetails(spot) {
            document.getElementById('spot-name').innerText = spot.address;
            document.getElementById('spot-capacity').innerText = spot.capacity;
            document.getElementById('btn-waze').href = `waze://?ll=${spot.lat},${spot.lng}&navigate=yes`;
            document.getElementById('btn-streetview').href = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${spot.lat},${spot.lng}`;

            if(userPos) {
                const d = map.distance(userPos, [spot.lat, spot.lng]) / 1000;
                document.getElementById('route-dist').innerText = `${d.toFixed(1)} km`;
                document.getElementById('route-time').innerText = `約 ${Math.round(d*3)} 分鐘`;
            }
            document.getElementById('bottom-sheet').classList.replace('sheet-closed', 'sheet-open');
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.replace('sheet-open', 'sheet-closed');
        }

        loadData();
    </script>
</body>
</html>
