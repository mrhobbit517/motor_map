<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港全港骨位地圖 (V18 終極保底版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #111; }
        .leaflet-control-zoom { display: none; }
        
        #bottom-sheet { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 204, 0.3);
        }
        .sheet-open { transform: translateY(0%); }
        .sheet-closed { transform: translateY(105%); }
        
        .user-location-marker { 
            background: #00ffcc; 
            border: 2px solid #fff; 
            border-radius: 50%; 
            box-shadow: 0 0 15px #00ffcc; 
        }
    </style>
</head>
<body>

    <div id="status-badge" class="absolute top-6 left-4 z-[1001] bg-black/80 border border-[#00ffcc]/30 text-[#00ffcc] text-xs px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-[#00ffcc] animate-pulse"></div>
        <span id="status-text">初始化骨位數據...</span>
    </div>

    <div id="map"></div>

    <button id="btn-locate" class="absolute bottom-28 right-6 z-[1001] bg-gray-900 border border-[#00ffcc]/50 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
        <svg class="w-6 h-6 text-[#00ffcc]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z"/></svg>
    </button>

    <div id="bottom-sheet" class="fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12">
        <div class="w-12 h-1 bg-gray-600 rounded-full mx-auto mb-2" onclick="closeSheet()"></div>
        
        <div class="flex justify-between items-start">
            <div class="w-2/3">
                <h2 id="spot-name" class="text-xl font-bold text-white leading-tight">請選擇位置</h2>
                <div class="flex gap-2 text-[#00ffcc] font-bold text-xs mt-2">
                    <span id="route-dist" class="bg-[#00ffcc]/10 px-2 py-1 rounded border border-[#00ffcc]/20">-- km</span>
                    <span id="route-time" class="bg-[#00ffcc]/10 px-2 py-1 rounded border border-[#00ffcc]/20">-- mins</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 block font-bold uppercase tracking-widest">提供車位</span>
                <span id="spot-capacity" class="text-4xl font-black text-[#00ffcc]">--</span>
            </div>
        </div>
        
        <div class="flex flex-col gap-3 mt-3">
            <a id="btn-waze" href="#" class="w-full bg-[#00ffcc] text-black text-center text-lg font-bold py-4 rounded-2xl active:scale-95 transition-transform shadow-[0_0_20px_rgba(0,255,204,0.3)]">
                Waze 導航 (避相機)
            </a>
            <button onclick="closeSheet()" class="text-gray-500 text-sm py-2">返回地圖</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script>
        // 1. 初始化地圖
        const map = L.map('map', { zoomControl: false }).setView([22.3193, 114.1694], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = L.markerClusterGroup({
            iconCreateFunction: function(cluster) {
                return L.divIcon({
                    html: `<div style="background:rgba(17,24,39,0.9); border:2px solid #00ffcc; color:#00ffcc; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow:0 0 10px #00ffcc;">${cluster.getChildCount()}</div>`,
                    className: '', iconSize: [40, 40]
                });
            }
        });
        
        let userPos = null;

        // 2. 定位功能
        function updateLocation() {
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userPos = [pos.coords.latitude, pos.coords.longitude];
                    L.marker(userPos, { icon: L.divIcon({className: 'user-location-marker', iconSize:[16,16]}) }).addTo(map);
                    map.flyTo(userPos, 14);
                }, null, {enableHighAccuracy: true});
            }
        }
        document.getElementById('btn-locate').onclick = updateLocation;
        updateLocation();

        // 3. 核心骨位保底數據 (確保斷網都一定有野睇)
        const coreSpots = [
            { "address": "旺角西洋菜南街", "lat": 22.3194, "lng": 114.1706, "capacity": 12 },
            { "address": "尖沙咀海防道", "lat": 22.2989, "lng": 114.1717, "capacity": 20 },
            { "address": "觀塘開源道", "lat": 22.3105, "lng": 114.2238, "capacity": 15 },
            { "address": "銅鑼灣謝斐道", "lat": 22.2808, "lng": 114.1834, "capacity": 10 },
            { "address": "荃灣路德圍", "lat": 22.3735, "lng": 114.1165, "capacity": 25 },
            { "address": "沙田排頭街", "lat": 22.3831, "lng": 114.1878, "capacity": 18 }
        ];

        // 4. 強制讀取數據邏輯
        async function loadData() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            
            // 先放保底數據
            renderMarkers(coreSpots);
            statusText.innerText = "已載入核心骨位...";

            const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://raw.githubusercontent.com/g0vhk-archive/on-street-parking/master/data/motorcycle.json');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if (data && data.length > 0) {
                    renderMarkers(data); // 成功拎到就用全港數據覆蓋
                    statusText.innerText = "全港數據同步完成";
                    statusDot.classList.replace('animate-pulse', 'animate-none');
                    setTimeout(() => document.getElementById('status-badge').style.opacity = '0', 3000);
                }
            } catch (e) {
                // 如果 fetch 失敗，唔彈 Alert，默默用住保底數據
                statusText.innerText = "離線模式 (僅顯示核心位置)";
                statusDot.classList.replace('bg-[#00ffcc]', 'bg-yellow-500');
            }
        }

        function renderMarkers(data) {
            markers.clearLayers();
            data.forEach(spot => {
                const lat = parseFloat(spot.lat);
                const lng = parseFloat(spot.lng);
                if(isNaN(lat) || isNaN(lng)) return;

                const m = L.marker([lat, lng], {
                    icon: L.divIcon({
                        className: '',
                        html: `<div style="background:#111; border: 1.5px solid #00ffcc; color:#00ffcc; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900;">${spot.capacity || 'P'}</div>`,
                        iconSize: [30, 30]
                    })
                });
                
                m.on('click', () => {
                    document.getElementById('spot-name').innerText = spot.address || spot.name || "政府骨位";
                    document.getElementById('spot-capacity').innerText = spot.capacity || "??";
                    document.getElementById('btn-waze').href = `waze://?ll=${lat},${lng}&navigate=yes`;

                    if(userPos) {
                        const d = map.distance(userPos, [lat, lng]) / 1000;
                        document.getElementById('route-dist').innerText = `${d.toFixed(1)} km`;
                        document.getElementById('route-time').innerText = `約 ${Math.round(d*3)} 分鐘`;
                    }
                    document.getElementById('bottom-sheet').className = "fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-open flex flex-col gap-4 pb-12";
                });
                markers.addLayer(m);
            });
            map.addLayer(markers);
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').className = "fixed bottom-0 left-0 w-full rounded-t-3xl p-6 sheet-closed flex flex-col gap-4 pb-12";
        }

        loadData();
    </script>
</body>
</html>
